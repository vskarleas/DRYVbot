crowd_monitor:
  ros__parameters:
    publish_rate: 2.0             # Hz — how often /map_dynamic is republished
    gaussian_sigma: 0.80          # metres — spread of the Gaussian around each person
    density_scale: 30.0          # peak occupancy value at person centre (0-100)
    lethal_threshold: 25          # density value above which cells become walls
                                  #   lower → larger wall zone around each person
                                  #   higher → tighter zone, only very close to person

room_interpreter:
  ros__parameters:
    registry_path: ""

speech_node:
  ros__parameters:
    model_size: "base"
    default_language: "en"
    sample_rate: 16000
    max_duration: 8.0
    silence_threshold: 0.005
    silence_duration: 1.5
    device_index: 5